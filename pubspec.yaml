name: deenified
description: "The World's First Islamic Trivia App That Makes Learning Addictive."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Backend
  supabase_flutter: ^2.8.3
  
  # Payments
  purchases_flutter: ^8.5.1
  
  # Audio
  just_audio: ^0.10.5
  audio_service: ^0.18.17
  just_audio_background: ^0.0.1-beta.15
  
  # UI/UX
  flex_color_scheme: ^8.1.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  video_player: ^2.9.2
  
  # Networking
  http: ^1.2.2
  
  # Text-to-Speech
  flutter_tts: ^4.2.0
  
  # URL Launching
  url_launcher: ^6.3.1
  
  # Utilities
  flutter_dotenv: ^5.2.1
  go_router: ^14.8.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  intl: ^0.19.0
  
  # Storage
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  
  # Code Generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#FFD700"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/icons/
